load -r /openvms/ka655x.bin
attach nvr /data/nvram.bin

set cpu 128m
set cpu idle

set rq0 ra73
set rq2 rrd40

attach rq0 /data/vax.dsk

set rl disable
set ts disable

set xq ena
set xq mac=08:00:2b:aa:bb:cc
set xq type=delqa
; 513/514 are served by the privileged source port relay, slirp side on 10513/10514
attach xq nat:tcp=23:10.0.2.15:23,tcp=21:10.0.2.15:21,udp=69:10.0.2.15:69,tcp=10513:10.0.2.15:513,tcp=10514:10.0.2.15:514,udp=177:10.0.2.15:177

set cpu conhalt
dep bdr 0
boot cpu
exit
